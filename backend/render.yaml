databases:
  - name: mailpilot-db
    databaseName: mailpilot
    user: mailpilot
    plan: free

services:
  - type: web
    name: mailpilot-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_REDIRECT_URI
        sync: false

      - key: FRONTEND_URL
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: mailpilot-worker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A celery_worker worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: worker
    name: mailpilot-beat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A celery_worker beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false
databases:
  - name: mailpilot-db
    databaseName: mailpilot
    user: mailpilot
    plan: free

services:
  - type: web
    name: mailpilot-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_REDIRECT_URI
        sync: false

      - key: FRONTEND_URL
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: mailpilot-worker
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: worker
    name: mailpilot-beat
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mailpilot-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: FERNET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false